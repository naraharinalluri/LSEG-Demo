<app-header />
<main class="flex-1 min-h-0">
  <div
    class="grid grid-cols-12 grid-rows-12 gap-1.5 p-1.5 h-full min-h-0"
    (contextmenu)="$event.preventDefault()"
  >
    <div class="col-start-1 col-span-3 row-start-1 row-span-12 min-h-0">
      <app-client-book-panel />
    </div>
    <div class="col-start-4 col-span-6 row-start-1 row-span-2 min-h-0">
      <app-client-summary-panel />
    </div>
    <div class="col-start-4 col-span-6 row-start-3 row-span-6 min-h-0">
      <app-holdings-panel />
    </div>
    <div class="col-start-4 col-span-6 row-start-9 row-span-4 min-h-0">
      <app-performance-panel />
    </div>
    <div class="col-start-10 col-span-3 row-start-1 row-span-4 min-h-0">
      <app-activity-panel />
    </div>
    <div class="col-start-10 col-span-3 row-start-5 row-span-4 min-h-0">
      <app-research-panel />
    </div>
    <div class="col-start-10 col-span-3 row-start-9 row-span-4 min-h-0">
      <app-news-panel />
    </div>
  </div>
</main>
